name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: kiki_studio
          MYSQL_USER: kiki
          MYSQL_PASSWORD: kiki_dev
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://kiki:kiki_dev@localhost:3306/kiki_studio
      RESEND_API_KEY: re_test_placeholder
      EMAIL_FROM: "Kiki CI <ci@test.local>"
      EMAIL_TRANSPORT: file
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      ADMIN_NOTIFY_EMAIL: ci-admin@test.local
      ADMIN_EMAILS: ci-admin@test.local,e2e-admin@test.local
      AUTH_SECRET: ci-secret-32-bytes-minimum-abcdefgh
      AUTH_URL: http://localhost:3000
      ACTION_TOKEN_SECRET: ci-action-secret-32-bytes-abcdefghi
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.1 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma migrate deploy
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Migration drift check
        run: pnpm exec prisma migrate diff --from-schema-datasource prisma/schema.prisma --to-schema-datamodel prisma/schema.prisma --exit-code
